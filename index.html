<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H5 小游戏合集</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 H5 小游戏</h1>
            <p>点击选择游戏开始玩</p>
        </header>

        <div class="game-grid">
            <!-- Space Runner -->
            <a href="space-runner/" class="game-card">
                <div class="game-icon">🚀</div>
                <div class="game-info">
                    <h2>Space Runner</h2>
                    <p>太空跑酷</p>
                    <span class="tag">横版跳跃</span>
                </div>
            </a>

            <!-- Pizza Stack -->
            <a href="pizza-stack/" class="game-card">
                <div class="game-icon">🍕</div>
                <div class="game-info">
                    <h2>Pizza Stack</h2>
                    <p>披萨叠叠乐</p>
                    <span class="tag">休闲</span>
                </div>
            </a>
        </div>

        <footer>
            <p>更多游戏持续更新中...</p>
        </footer>
    </div>
</body>
</html>
