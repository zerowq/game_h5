<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>披萨叠叠乐 - Pizza Stack</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #1a0a00;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #gameCanvas {
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
// ============================================================
//  披萨叠叠乐 - Pizza Stack (v3 - 完全重写，干净可靠)
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- 屏幕适配 ---
let W, H, scale;
function resize() {
    const ratio = 9 / 16;
    if (window.innerWidth / window.innerHeight < ratio) {
        W = window.innerWidth;
        H = W / ratio;
    } else {
        H = window.innerHeight;
        W = H * ratio;
    }
    const dx = (window.innerWidth - W) / 2;
    const dy = (window.innerHeight - H) / 2;
    canvas.style.position = 'absolute';
    canvas.style.left = dx + 'px';
    canvas.style.top = dy + 'px';
    canvas.width = W;
    canvas.height = H;
    scale = W / 400;
}
window.addEventListener('resize', resize);
resize();

// --- 游戏状态 ---
const STATE = { MENU: 0, PLAYING: 1, GAMEOVER: 2 };
let state = STATE.MENU;
let score = 0;
let highScore = parseInt(localStorage.getItem('pizzaStackHigh') || '0');
let layerCount = 0;
let combo = 0;
let animTime = 0;

// --- 配料 ---
const INGREDIENTS = [
    { name: 'cheese', emoji: '🧀', color: '#FFD700' },
    { name: 'sausage', emoji: '🌭', color: '#CC3333' },
    { name: 'pepper', emoji: '🫑', color: '#33AA33' },
    { name: 'mushroom', emoji: '🍄', color: '#CC8844' },
    { name: 'olive', emoji: '🫒', color: '#555555' },
    { name: 'onion', emoji: '🧅', color: '#DDAA66' },
];

// --- 游戏数据 ---
let stack = [];          // 已叠好的披萨层 [{x, y, w, h, ingredients}]
let fallingPieces = [];  // 被切掉飞出去的面片 [{x,y,w,h,vx,vy,rot,rotSpeed,alpha,ingredients}]
let particles = [];      // 粒子 [{x,y,vx,vy,r,color,life}]
let cameraY = 0;

// 当前移动的面团
let dough = null;        // {x, y, w, h, speed, ingredients, cutting}

// 订单
let orderIngredients = [];
let orderTimer = 0;
let orderDone = false;
let feedbackMsg = '';
let feedbackTimer = 0;

// --- 工具函数 ---
function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }
function randomIngredient() { return INGREDIENTS[randInt(0, INGREDIENTS.length - 1)]; }
function randomIngredients(count) {
    const shuffled = shuffle([...INGREDIENTS]);
    return shuffled.slice(0, count).map(i => ({...i}));
}

// --- 栈顶Y坐标 ---
function stackTopY() {
    if (stack.length === 0) return H * 0.65;
    return stack[stack.length - 1].y - stack[stack.length - 1].h;
}

// --- 生成订单 ---
function genOrder() {
    const count = Math.min(2 + Math.floor(layerCount / 10), 3);
    orderIngredients = randomIngredients(count);
    orderDone = false;
    orderTimer = 500; // ~8秒
}

// --- 检查订单 ---
function checkOrder() {
    if (orderDone || orderIngredients.length === 0) return;
    const lastLayer = stack[stack.length - 1];
    if (!lastLayer) return;
    const layerNames = lastLayer.ingredients.map(i => i.name);
    const orderNames = orderIngredients.map(i => i.name);
    // 只要有一个配料匹配
    const hasMatch = orderNames.some(n => layerNames.includes(n));
    if (hasMatch) {
        orderDone = true;
        score += 50;
        feedbackMsg = '✅ 订单完成! +50';
        feedbackTimer = 60;
        addParticles(W/2, H*0.15, '#00FF00', 20);
    }
}

// --- 生成面团 ---
function spawnDough() {
    const baseW = randInt(70, 100) * scale;
    const dir = Math.random() < 0.5 ? -1 : 1;
    dough = {
        x: dir > 0 ? -baseW : W + baseW,
        y: stackTopY(),
        w: baseW,
        h: 18 * scale,
        speed: (1.5 + Math.random()) * scale * dir,
        ingredients: randomIngredients(randInt(2, 3)),
        cutting: false,
    };
}

// --- 切割 ---
function cutDough() {
    if (!dough || dough.cutting || state !== STATE.PLAYING) return;
    dough.cutting = true;
    
    // 默认从中间切（如果cutRatio没设置）
    const ratio = (dough.cutRatio != null && dough.cutRatio >= 0 && dough.cutRatio <= 1) ? dough.cutRatio : 0.5;
    const clickX = dough.x + dough.w * ratio;
    const leftW = clickX - dough.x;
    const rightW = dough.x + dough.w - clickX;
    
    if (leftW <= 0 || rightW <= 0) {
        dough.cutting = false;
        return;
    }
    
    const ratio = Math.max(leftW, rightW) / Math.min(leftW, rightW);
    
    if (ratio < 1.3) {
        // 完美切割！两边都保留
        combo++;
        score += 10 * combo;
        feedbackMsg = `🎯 Perfect! Combo x${combo}`;
        feedbackTimer = 60;
        addParticles(clickX, dough.y + dough.h/2, '#FFD700', 15);
        addLayer(dough.x, dough.w);
    } else if (leftW > rightW) {
        // 左边大，丢弃左边，保留右边
        combo = 0;
        dropPiece(dough.x, leftW, -3, dough.y);
        addLayer(clickX, rightW);
    } else {
        // 右边大，丢弃右边，保留左边
        combo = 0;
        dropPiece(clickX + rightW, rightW, 3, dough.y);
        addLayer(clickX, leftW);
    }
}

function addLayer(x, w) {
    const layer = {
        x: x,
        y: dough.y,
        w: w,
        h: dough.h,
        ingredients: [...dough.ingredients],
    };
    stack.push(layer);
    layerCount++;
    score += Math.round(w / scale);
    checkOrder();
    
    // 失败条件：面团太窄（小于10px）切完后游戏结束
    if (w < 10 * scale) {
        feedbackMsg = '💀 面团太薄了!';
        feedbackTimer = 60;
        setTimeout(() => { if (state === STATE.PLAYING) gameOver(); }, 500);
        return;
    }
    
    // 延迟生成下一个面团
    setTimeout(() => {
        if (state === STATE.PLAYING) spawnDough();
    }, 300);
}

function dropPiece(startX, w, vx, y) {
    fallingPieces.push({
        x: startX, y: y, w: w, h: dough.h,
        vx: vx * scale, vy: -2 * scale,
        rotation: 0, rotSpeed: (Math.random() < 0.5 ? -1 : 1) * 0.05,
        alpha: 1, ingredients: [...dough.ingredients],
    });
}

function addParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const spd = Math.random() * 4 + 1;
        particles.push({
            x, y,
            vx: Math.cos(angle) * spd,
            vy: Math.sin(angle) * spd - 2,
            r: Math.random() * 4 + 2,
            color,
            life: 1,
        });
    }
}

// --- 开始游戏 ---
function startGame() {
    state = STATE.PLAYING;
    score = 0;
    layerCount = 0;
    combo = 0;
    animTime = 0;
    stack = [];
    fallingPieces = [];
    particles = [];
    cameraY = 0;
    feedbackMsg = '';
    feedbackTimer = 0;
    dough = null;
    genOrder();
    spawnDough();
}

function gameOver() {
    state = STATE.GAMEOVER;
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('pizzaStackHigh', highScore.toString());
    }
}

// --- 输入 ---
function handleTap() {
    if (state === STATE.MENU) {
        startGame();
        return;
    }
    if (state === STATE.GAMEOVER) {
        if (animTime > 0.5) startGame();
        return;
    }
    if (state === STATE.PLAYING && dough && !dough.cutting) {
        cutDough();
    }
}

canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (state === STATE.PLAYING && dough && !dough.cutting) {
        // 点击面团任意位置就切，默认从中间切
        dough.cutRatio = 0.5;
    }
    handleTap();
});

canvas.addEventListener('click', (e) => {
    if (state === STATE.PLAYING && dough && !dough.cutting) {
        // 点击面团任意位置就切，默认从中间切
        dough.cutRatio = 0.5;
    }
    handleTap();
});

document.addEventListener('keydown', (e) => {
    if (e.key === ' ' || e.key === 'Enter') {
        handleTap();
    }
});

// --- 更新 ---
function update(dt) {
    animTime += dt;
    
    if (state !== STATE.PLAYING) return;
    
    // 面团移动
    if (dough && !dough.cutting) {
        dough.x += dough.speed;
        dough.y = stackTopY();
        if (dough.x < -dough.w) { dough.speed = Math.abs(dough.speed); }
        if (dough.x + dough.w > W) { dough.speed = -Math.abs(dough.speed); }
    }
    
    // 掉落面片
    for (let i = fallingPieces.length - 1; i >= 0; i--) {
        const p = fallingPieces[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.15;
        p.rotation += p.rotSpeed;
        p.alpha -= 0.015;
        if (p.alpha <= 0) fallingPieces.splice(i, 1);
    }
    
    // 粒子
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.1;
        p.life -= 0.02;
        if (p.life <= 0) particles.splice(i, 1);
    }
    
    // 订单倒计时
    if (!orderDone && orderTimer > 0) {
        orderTimer -= dt * 60;
        if (orderTimer <= 0) {
            score = Math.max(0, score - 30);
            combo = 0;
            feedbackMsg = '⏰ 订单超时! -30';
            feedbackTimer = 60;
            genOrder();
        }
    }
    
    // 反馈消息
    if (feedbackTimer > 0) feedbackTimer--;
    
    // 相机跟随
    const stackH = stack.length * 20 * scale;
    cameraY += (Math.max(0, -(stackH - H * 0.6)) - cameraY) * 0.08;
}

// --- 绘制 ---
function drawRectRounded(x, y, w, h, r, fill, stroke) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
}

function drawLayer(layer) {
    const x = layer.x, y = layer.y, w = layer.w, h = layer.h;
    if (w <= 0 || h <= 0 || isNaN(w) || isNaN(h)) return;
    
    // 渐变底色
    const grad = ctx.createLinearGradient(x, y, x + w, y + h);
    grad.addColorStop(0, '#F4A460');
    grad.addColorStop(0.5, '#DEB887');
    grad.addColorStop(1, '#D2691E');
    drawRectRounded(x, y, w, h, 6 * scale, grad, '#CD853F');
    
    // 配料emoji
    ctx.font = `${12 * scale}px Arial`;
    ctx.textAlign = 'center';
    for (let i = 0; i < layer.ingredients.length; i++) {
        const ix = x + (i + 0.5) * (w / (layer.ingredients.length + 1));
        ctx.fillText(layer.ingredients[i].emoji, ix, y + h/2 + 4 * scale);
    }
}

function drawDough() {
    if (!dough) return;
    const d = dough;
    
    // 面团底色
    const grad = ctx.createLinearGradient(d.x, d.y, d.x, d.y + d.h);
    grad.addColorStop(0, '#FFE4B5');
    grad.addColorStop(1, '#DEB887');
    drawRectRounded(d.x, d.y, d.w, d.h, 4 * scale, grad, 'rgba(255,255,255,0.3)');
    
    // 配料
    ctx.font = `${10 * scale}px Arial`;
    ctx.textAlign = 'center';
    for (let i = 0; i < d.ingredients.length; i++) {
        const ix = d.x + (i + 0.5) * (d.w / (d.ingredients.length + 1));
        ctx.fillText(d.ingredients[i].emoji, ix, d.y + d.h/2 + 4 * scale);
    }
    
    // 切割线指示
    if (d.cutRatio !== undefined && d.cutRatio >= 0 && d.cutRatio <= 1) {
        const cutX = d.x + d.w * d.cutRatio;
        ctx.strokeStyle = 'rgba(255,255,255,0.7)';
        ctx.lineWidth = 2 * scale;
        ctx.setLineDash([4 * scale, 4 * scale]);
        ctx.beginPath();
        ctx.moveTo(cutX, d.y - 8 * scale);
        ctx.lineTo(cutX, d.y + d.h + 8 * scale);
        ctx.stroke();
        ctx.setLineDash([]);
    }
}

function drawFallingPiece(p) {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.translate(p.x + p.w/2, p.y + p.h/2);
    ctx.rotate(p.rotation);
    ctx.fillStyle = '#DEB887';
    ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    ctx.restore();
}

function drawParticles() {
    for (const p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
}

function drawUI() {
    const s = scale;
    
    // 分数
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${20*s}px Arial`;
    ctx.textAlign = 'left';
    ctx.fillText(`🍕 ${score}`, 10*s, 30*s);
    
    // 层数
    ctx.font = `${14*s}px Arial`;
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText(`${layerCount}层`, 10*s, 50*s);
    
    // Combo
    if (combo > 1) {
        ctx.fillStyle = '#FFD700';
        ctx.font = `bold ${16*s}px Arial`;
        ctx.fillText(`Combo x${combo}!`, 10*s, 70*s);
    }
    
    // 订单面板
    if (orderIngredients.length > 0 && !orderDone) {
        const ox = W - 120*s, oy = 15*s;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.beginPath();
        ctx.roundRect(ox, oy, 110*s, 50*s, 8*s);
        ctx.fill();
        
        ctx.fillStyle = '#fff';
        ctx.font = `${12*s}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText('订单:', ox + 55*s, oy + 15*s);
        
        for (let i = 0; i < orderIngredients.length; i++) {
            ctx.fillText(orderIngredients[i].emoji, ox + 25*s + i*25*s, oy + 38*s);
        }
        
        // 倒计时条
        const ratio = Math.max(0, orderTimer / 500);
        ctx.fillStyle = ratio > 0.3 ? '#4CAF50' : '#F44336';
        ctx.fillRect(ox + 5*s, oy + 45*s, 100*s*ratio, 3*s);
    }
    
    if (orderDone) {
        ctx.fillStyle = '#4CAF50';
        ctx.font = `bold ${16*s}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText('✅ 已完成', W - 80*s, 35*s);
    }
    
    // 反馈消息
    if (feedbackTimer > 0) {
        ctx.globalAlpha = Math.min(feedbackTimer / 20, 1);
        ctx.fillStyle = feedbackMsg.includes('✅') || feedbackMsg.includes('Perfect') ? '#4CAF50' : '#F44336';
        ctx.font = `bold ${18*s}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText(feedbackMsg, W/2, 90*s);
        ctx.globalAlpha = 1;
    }
}

function drawMenu() {
    const s = scale;
    ctx.fillStyle = '#FF6B35';
    ctx.font = `bold ${40*s}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('🍕 披萨叠叠乐', W/2, H*0.25);
    
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = `${14*s}px Arial`;
    ctx.fillText('Pizza Stack', W/2, H*0.31);
    // 操作说明
    ctx.font = `${12*s}px Arial`;
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.fillText('🍕 玩法说明', W/2, H*0.38);
    ctx.fillText('面团来回移动时，点击屏幕切一刀', W/2, H*0.42);
    ctx.fillText('切得越准，留下的面团越大', W/2, H*0.47);
    ctx.fillText('两边差不多大 → Perfect! 加分+', W/2, H*0.52);
    ctx.fillText('叠得越高分数越高，面团会越来越薄', W/2, H*0.57);
    ctx.fillText('面团太薄就切不动啦，注意把握时机', W/2, H*0.62);
    
    // 开始按钮
    const pulse = 1 + Math.sin(animTime * 4) * 0.05;
    ctx.save();
    ctx.translate(W/2, H*0.62);
    ctx.scale(pulse, pulse);
    ctx.fillStyle = '#FF6B35';
    ctx.beginPath();
    ctx.roundRect(-70*s, -25*s, 140*s, 50*s, 25*s);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${20*s}px Arial`;
    ctx.fillText('开始游戏', 0, 7*s);
    ctx.restore();
    
    if (highScore > 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.font = `${12*s}px Arial`;
        ctx.fillText(`最高分: ${highScore}`, W/2, H*0.75);
    }
}

function drawGameOver() {
    const s = scale;
    const alpha = Math.min(animTime / 0.5, 0.7);
    
    ctx.fillStyle = `rgba(0,0,0,${alpha})`;
    ctx.fillRect(0, 0, W, H);
    
    ctx.fillStyle = '#FF6B35';
    ctx.font = `bold ${32*s}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('游戏结束', W/2, H*0.30);
    
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${48*s}px Arial`;
    ctx.fillText(`${score}`, W/2, H*0.42);
    
    ctx.font = `${14*s}px Arial`;
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText(`得分`, W/2, H*0.48);
    
    ctx.fillStyle = '#fff';
    ctx.font = `${16*s}px Arial`;
    ctx.fillText(`叠了 ${layerCount} 层`, W/2, H*0.55);
    
    if (score >= highScore && score > 0) {
        ctx.fillStyle = '#FFD700';
        ctx.font = `bold ${16*s}px Arial`;
        ctx.fillText('🎉 新纪录！', W/2, H*0.62);
    }
    
    if (animTime > 0.5) {
        const pulse = 1 + Math.sin(animTime * 3) * 0.03;
        ctx.save();
        ctx.translate(W/2, H*0.72);
        ctx.scale(pulse, pulse);
        ctx.fillStyle = '#FF6B35';
        ctx.beginPath();
        ctx.roundRect(-60*s, -22*s, 120*s, 44*s, 22*s);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${18*s}px Arial`;
        ctx.fillText('再来一次', 0, 6*s);
        ctx.restore();
    }
}

function draw() {
    // 背景
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#1a0a00');
    grad.addColorStop(0.5, '#2a1500');
    grad.addColorStop(1, '#1a0a00');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    
    // 厨房瓷砖背景
    ctx.strokeStyle = 'rgba(255,107,53,0.1)';
    ctx.lineWidth = 1;
    for (let i = 0; i < W; i += 40*scale) {
        for (let j = 0; j < H; j += 40*scale) {
            ctx.strokeRect(i, j, 40*scale, 40*scale);
        }
    }
    
    if (state === STATE.PLAYING || state === STATE.GAMEOVER) {
        ctx.save();
        ctx.translate(0, cameraY);
        
        // 掉落面片
        for (const p of fallingPieces) drawFallingPiece(p);
        
        // 堆叠的披萨
        for (const layer of stack) drawLayer(layer);
        
        // 当前面团
        if (dough && state === STATE.PLAYING) drawDough();
        
        ctx.restore();
        
        // 粒子
        drawParticles();
        
        // UI
        drawUI();
    }
    
    if (state === STATE.MENU) drawMenu();
    if (state === STATE.GAMEOVER) drawGameOver();
}

// --- 主循环 ---
let lastTime = 0;
function loop(timestamp) {
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;
    
    if (state === STATE.GAMEOVER) animTime += dt;
    
    update(dt);
    draw();
    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
