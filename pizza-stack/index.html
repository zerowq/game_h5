<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>披萨叠叠乐 - Pizza Stack</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #1a0a00;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #gameCanvas {
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
// ============================================================
//  披萨叠叠乐 - Pizza Stack (v7)
//  核心玩法：
//  1. 面团在栈顶上来回移动
//  2. 点击 → 面团在**栈边缘处**被切断
//  3. 超出栈的部分飞出去，留在栈上的部分叠到新层
//  4. 切得越准（面团刚好在栈上），留下越多
//  5. 面团越来越小，太小就输
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H, scale;
function resize() {
    const ratio = 9 / 16;
    if (window.innerWidth / window.innerHeight < ratio) {
        W = window.innerWidth;
        H = W / ratio;
    } else {
        H = window.innerHeight;
        W = H * ratio;
    }
    const dx = (window.innerWidth - W) / 2;
    const dy = (window.innerHeight - H) / 2;
    canvas.style.position = 'absolute';
    canvas.style.left = dx + 'px';
    canvas.style.top = dy + 'px';
    canvas.width = W;
    canvas.height = H;
    scale = W / 400;
}
window.addEventListener('resize', resize);
resize();

// --- 状态 ---
const STATE = { MENU: 0, PLAYING: 1, GAMEOVER: 2 };
let state = STATE.MENU;
let score = 0;
let highScore = parseInt(localStorage.getItem('pizzaStackHigh') || '0');
let layerCount = 0;
let combo = 0;
let animTime = 0;

// --- 游戏数据 ---
let stack = [];
let fallingPieces = [];
let particles = [];
let cameraY = 0;
let dough = null;
let feedbackMsg = '';
let feedbackTimer = 0;
let feedbackColor = '#fff';
let startDoughX = 0;  // 记录面团起始X，用于计算切掉多少

// --- 栈顶Y ---
function stackTopY() {
    if (stack.length === 0) return H * 0.7;
    return stack[stack.length - 1].y - stack[stack.length - 1].h;
}

// --- 生成第一层（基础层） ---
function spawnBaseLayer() {
    const baseW = 120 * scale;
    startDoughX = (W - baseW) / 2;
    dough = {
        x: startDoughX,
        y: H * 0.7,
        w: baseW,
        h: 18 * scale,
        cutting: false,
    };
    // 第一层直接叠上
    stack.push({ x: dough.x, y: dough.y, w: dough.w, h: dough.h });
    layerCount = 1;
    score = Math.round(dough.w / scale);
    dough = null;
    spawnMovingDough();
}

// --- 生成移动面团 ---
function spawnMovingDough() {
    if (!dough || dough.w < 10 * scale) {
        doGameOver();
        return;
    }
    const dir = Math.random() < 0.5 ? -1 : 1;
    const spd = (1.5 + layerCount * 0.2) * scale;
    startDoughX = dir > 0 ? -dough.w : W;
    dough = {
        x: startDoughX,
        y: stackTopY(),
        w: dough.w,
        h: 18 * scale,
        speed: spd * dir,
        cutting: false,
        moving: true,
    };
}

// --- 切割：面团在栈边缘处被切断 ---
function cutDough() {
    if (!dough || dough.cutting || state !== STATE.PLAYING) return;
    dough.cutting = true;
    dough.moving = false;
    
    // 上一层的右边缘
    const lastLayer = stack[stack.length - 1];
    const rightEdge = lastLayer.x + lastLayer.w;
    const leftEdge = lastLayer.x;
    
    // 面团右边缘
    const doughRight = dough.x + dough.w;
    const doughLeft = dough.x;
    
    // 计算留在栈上的部分
    // 保留面团与栈重叠的部分
    const overlapLeft = Math.max(doughLeft, leftEdge);
    const overlapRight = Math.min(doughRight, rightEdge);
    
    if (overlapRight <= overlapLeft) {
        // 面团完全在栈外面！全部切掉
        dropEntirePiece();
        doGameOver();
        return;
    }
    
    const remainW = overlapRight - overlapLeft;
    const remainX = overlapLeft;
    
    // 计算切掉的部分
    const droppedLeftW = overlapLeft - doughLeft;
    const droppedRightW = doughRight - overlapRight;
    
    if (droppedLeftW > 0) {
        dropPiece(doughLeft, droppedLeftW, -3, dough.y);
    }
    if (droppedRightW > 0) {
        dropPiece(overlapRight, droppedRightW, 3, dough.y);
    }
    
    // 检查是否完美切割（面团刚好在栈上，没有切掉任何部分）
    const originalW = dough.w;
    const perfect = (remainW >= originalW * 0.99);
    
    // 添加新层
    addLayer(remainX, remainW, perfect);
}

function dropEntirePiece() {
    dropPiece(dough.x, dough.w, dough.speed > 0 ? 3 : -3, dough.y);
}

function addLayer(x, w, perfect) {
    const layer = { x: x, y: dough.y, w: w, h: dough.h };
    stack.push(layer);
    layerCount++;
    score += Math.round(w / scale);
    
    if (perfect) {
        combo++;
        score += 20 * combo;
        feedbackMsg = `✨ 完美! Combo x${combo} +${20*combo}`;
        feedbackColor = '#FFD700';
        feedbackTimer = 60;
        addParticles(x + w/2, dough.y + dough.h/2, '#FFD700', 20);
    } else {
        combo = 0;
        const lost = 1 - (w / dough.w);
        if (lost > 0.5) {
            feedbackMsg = '😱 切太多啦!';
            feedbackColor = '#F44336';
        } else if (lost > 0.2) {
            feedbackMsg = '切掉了一些';
            feedbackColor = '#FFA500';
        } else {
            feedbackMsg = '切得不错';
            feedbackColor = '#4CAF50';
        }
        feedbackTimer = 40;
    }
    
    // 失败：面团太窄
    if (w < 10 * scale) {
        feedbackMsg = '💀 面团太薄了!';
        feedbackColor = '#F44336';
        feedbackTimer = 60;
        setTimeout(() => { if (state === STATE.PLAYING) doGameOver(); }, 600);
        return;
    }
    
    // 生成下一个面团
    setTimeout(() => {
        if (state === STATE.PLAYING) spawnMovingDough();
    }, 200);
}

function dropPiece(startX, w, vx, y) {
    fallingPieces.push({
        x: startX, y: y, w: w, h: dough.h,
        vx: vx * scale, vy: -2 * scale,
        rotation: 0, rotSpeed: (Math.random() < 0.5 ? -1 : 1) * 0.05,
        alpha: 1,
    });
}

function addParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const spd = Math.random() * 4 + 1;
        particles.push({
            x, y,
            vx: Math.cos(angle) * spd,
            vy: Math.sin(angle) * spd - 2,
            r: Math.random() * 4 + 2,
            color,
            life: 1,
        });
    }
}

function startGame() {
    state = STATE.PLAYING;
    score = 0;
    layerCount = 0;
    combo = 0;
    animTime = 0;
    stack = [];
    fallingPieces = [];
    particles = [];
    cameraY = 0;
    feedbackMsg = '';
    feedbackTimer = 0;
    dough = null;
    spawnBaseLayer();
}

function doGameOver() {
    state = STATE.GAMEOVER;
    animTime = 0;
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('pizzaStackHigh', highScore.toString());
    }
}

function handleTap() {
    if (state === STATE.MENU) { startGame(); return; }
    if (state === STATE.GAMEOVER) {
        if (animTime > 0.5) startGame();
        return;
    }
    if (state === STATE.PLAYING && dough && !dough.cutting) {
        cutDough();
    }
}

canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(); });
canvas.addEventListener('click', (e) => { e.preventDefault(); handleTap(); });
document.addEventListener('keydown', (e) => {
    if (e.key === ' ' || e.key === 'Enter') handleTap();
});

function update(dt) {
    animTime += dt;
    
    if (state !== STATE.PLAYING) return;
    
    // 面团移动
    if (dough && dough.moving && !dough.cutting) {
        dough.x += dough.speed;
        dough.y = stackTopY();
        if (dough.x < -dough.w) { dough.speed = Math.abs(dough.speed); }
        if (dough.x + dough.w > W) { dough.speed = -Math.abs(dough.speed); }
    }
    
    // 掉落面片
    for (let i = fallingPieces.length - 1; i >= 0; i--) {
        const p = fallingPieces[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.15;
        p.rotation += p.rotSpeed; p.alpha -= 0.015;
        if (p.alpha <= 0) fallingPieces.splice(i, 1);
    }
    
    // 粒子
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.1;
        p.life -= 0.02;
        if (p.life <= 0) particles.splice(i, 1);
    }
    
    if (feedbackTimer > 0) feedbackTimer--;
    
    // 相机跟随
    if (dough && dough.moving) {
        const targetY = -(dough.y - H * 0.65);
        cameraY += (targetY - cameraY) * 0.1;
    }
}

function drawRectRounded(x, y, w, h, r, fill, stroke) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
}

function drawLayer(layer) {
    const x = layer.x, y = layer.y, w = layer.w, h = layer.h;
    if (w <= 0 || h <= 0 || isNaN(w)) return;
    const grad = ctx.createLinearGradient(x, y, x + w, y + h);
    grad.addColorStop(0, '#F4A460');
    grad.addColorStop(0.5, '#DEB887');
    grad.addColorStop(1, '#D2691E');
    drawRectRounded(x, y, w, h, 4 * scale, grad, '#CD853F');
}

function drawDough() {
    if (!dough) return;
    const d = dough;
    const grad = ctx.createLinearGradient(d.x, d.y, d.x, d.y + d.h);
    grad.addColorStop(0, '#FFE4B5');
    grad.addColorStop(1, '#DEB887');
    drawRectRounded(d.x, d.y, d.w, d.h, 4 * scale, grad, 'rgba(255,255,255,0.4)');
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${10*scale}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('点击切!', d.x + d.w/2, d.y + d.h/2 + 4*scale);
}

function drawFallingPiece(p) {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.translate(p.x + p.w/2, p.y + p.h/2);
    ctx.rotate(p.rotation);
    ctx.fillStyle = '#DEB887';
    ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    ctx.restore();
}

function drawParticles() {
    for (const p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
}

function drawUI() {
    const s = scale;
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${20*s}px Arial`;
    ctx.textAlign = 'left';
    ctx.fillText(`🍕 ${score}`, 10*s, 30*s);
    ctx.font = `${14*s}px Arial`;
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText(`${layerCount}层`, 10*s, 50*s);
    if (combo > 1) {
        ctx.fillStyle = '#FFD700';
        ctx.font = `bold ${16*s}px Arial`;
        ctx.fillText(`Combo x${combo}!`, 10*s, 70*s);
    }
    if (feedbackTimer > 0) {
        ctx.globalAlpha = Math.min(feedbackTimer / 20, 1);
        ctx.fillStyle = feedbackColor;
        ctx.font = `bold ${18*s}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText(feedbackMsg, W/2, 85*s);
        ctx.globalAlpha = 1;
    }
}

function drawMenu() {
    const s = scale;
    ctx.fillStyle = '#FF6B35';
    ctx.font = `bold ${42*s}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('🍕 披萨叠叠乐', W/2, H*0.2);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${14*s}px Arial`;
    ctx.fillText('Pizza Stack', W/2, H*0.26);
    ctx.font = `${13*s}px Arial`;
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('面团在栈顶上来回移动', W/2, H*0.36);
    ctx.fillText('点击屏幕，面团在栈边缘处被切断', W/2, H*0.41);
    ctx.fillText('超出栈的部分飞出去，留在栈上的叠起来', W/2, H*0.46);
    ctx.fillText('切得越准，留下的面团越大', W/2, H*0.51);
    ctx.fillText('面团越来越小，太小就输了', W/2, H*0.56);
    const pulse = 1 + Math.sin(animTime * 4) * 0.05;
    ctx.save();
    ctx.translate(W/2, H*0.68);
    ctx.scale(pulse, pulse);
    ctx.fillStyle = '#FF6B35';
    ctx.beginPath();
    ctx.roundRect(-80*s, -28*s, 160*s, 56*s, 28*s);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${22*s}px Arial`;
    ctx.fillText('开始游戏', 0, 8*s);
    ctx.restore();
    if (highScore > 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.font = `${13*s}px Arial`;
        ctx.fillText(`最高分: ${highScore}`, W/2, H*0.80);
    }
}

function drawGameOver() {
    const s = scale;
    const alpha = Math.min(animTime / 0.5, 0.7);
    ctx.fillStyle = `rgba(0,0,0,${alpha})`;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#FF6B35';
    ctx.font = `bold ${36*s}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('游戏结束', W/2, H*0.28);
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${52*s}px Arial`;
    ctx.fillText(`${score}`, W/2, H*0.42);
    ctx.font = `${14*s}px Arial`;
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText(`得分`, W/2, H*0.48);
    ctx.fillStyle = '#fff';
    ctx.font = `${16*s}px Arial`;
    ctx.fillText(`叠了 ${layerCount} 层`, W/2, H*0.55);
    if (score >= highScore && score > 0) {
        ctx.fillStyle = '#FFD700';
        ctx.font = `bold ${18*s}px Arial`;
        ctx.fillText('🎉 新纪录！', W/2, H*0.62);
    }
    if (animTime > 0.5) {
        const pulse = 1 + Math.sin(animTime * 3) * 0.03;
        ctx.save();
        ctx.translate(W/2, H*0.73);
        ctx.scale(pulse, pulse);
        ctx.fillStyle = '#FF6B35';
        ctx.beginPath();
        ctx.roundRect(-70*s, -25*s, 140*s, 50*s, 25*s);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${20*s}px Arial`;
        ctx.fillText('再来一次', 0, 7*s);
        ctx.restore();
    }
}

function draw() {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#1a0a00');
    grad.addColorStop(0.5, '#2a1500');
    grad.addColorStop(1, '#1a0a00');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(255,107,53,0.08)';
    ctx.lineWidth = 1;
    for (let i = 0; i < W; i += 40*scale) {
        for (let j = 0; j < H; j += 40*scale) {
            ctx.strokeRect(i, j, 40*scale, 40*scale);
        }
    }
    if (state === STATE.PLAYING || state === STATE.GAMEOVER) {
        ctx.save();
        ctx.translate(0, cameraY);
        for (const p of fallingPieces) drawFallingPiece(p);
        for (const layer of stack) drawLayer(layer);
        if (dough && state === STATE.PLAYING) drawDough();
        ctx.restore();
        drawParticles();
        drawUI();
    }
    if (state === STATE.MENU) drawMenu();
    if (state === STATE.GAMEOVER) drawGameOver();
}

let lastTime = 0;
function loop(timestamp) {
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;
    if (state === STATE.GAMEOVER) animTime += dt;
    update(dt);
    draw();
    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
