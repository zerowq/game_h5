<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>披萨叠叠乐 - Pizza Stack</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #1a0a00;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #gameCanvas {
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let W, H, scale;
function resize() {
    const ratio = 9 / 16;
    if (window.innerWidth / window.innerHeight < ratio) {
        W = window.innerWidth;
        H = W / ratio;
    } else {
        H = window.innerHeight;
        W = H * ratio;
    }
    const dx = (window.innerWidth - W) / 2;
    const dy = (window.innerHeight - H) / 2;
    canvas.style.position = 'absolute';
    canvas.style.left = dx + 'px';
    canvas.style.top = dy + 'px';
    canvas.width = W;
    canvas.height = H;
    scale = W / 400;
}
window.addEventListener('resize', resize);
resize();

// --- 状态 ---
const STATE = { MENU: 0, PLAYING: 1, GAMEOVER: 2 };
let state = STATE.MENU;
let score = 0;
let highScore = parseInt(localStorage.getItem('pizzaStackHigh') || '0');
let layerCount = 0;
let combo = 0;
let animTime = 0;
let gameState = 'playing'; // 'playing', 'dying'

// --- 配料 ---
const INGREDIENTS = [
    { name: 'cheese', emoji: '🧀', color: '#FFD700' },
    { name: 'sausage', emoji: '🌭', color: '#CC3333' },
    { name: 'pepper', emoji: '🫑', color: '#33AA33' },
    { name: 'mushroom', emoji: '🍄', color: '#CC8844' },
    { name: 'olive', emoji: '🫒', color: '#555555' },
    { name: 'onion', emoji: '🧅', color: '#DDAA66' },
];
const ING_NAMES = INGREDIENTS.map(i => i.name);
function randomIng() { return INGREDIENTS[Math.floor(Math.random() * INGREDIENTS.length)]; }

// --- 游戏数据 ---
let stack = [];
let fallingPieces = [];
let particles = [];
let cameraY = 0;
let dough = null;
let feedbackMsg = '';
let feedbackTimer = 0;
let feedbackColor = '#fff';

// --- 栈顶Y ---
function stackTopY() {
    if (stack.length === 0) return H * 0.7;
    return stack[stack.length - 1].y - stack[stack.length - 1].h;
}

// --- 检查是否需要重置栈位置 ---
function checkResetStack() {
    // 如果栈顶已经快到屏幕顶部了，把所有层往下移
    if (stack.length > 0) {
        const topY = stack[stack.length - 1].y;
        if (topY < H * 0.15) {
            const shiftAmount = H * 0.5; // 整体下移半个屏幕
            for (const layer of stack) {
                layer.y += shiftAmount;
            }
            feedbackMsg = '📦 栈已重置!';
            feedbackColor = '#00FFFF';
            feedbackTimer = 40;
            // 重新计算dough的y（如果面团存在）
            if (dough) dough.y = stackTopY();
        }
    }
}

// --- 生成第一层 ---
function spawnBaseLayer() {
    const baseW = 120 * scale;
    const ingredients = [randomIng(), randomIng()];
    dough = {
        x: W,
        y: H * 0.7,
        w: baseW,
        h: 18 * scale,
        speed: 2 * scale,
        ingredients: [...ingredients],
        cutting: false,
        moving: true,
    };
    // 第一层直接叠上
    stack.push({
        x: (W - baseW) / 2, y: H * 0.7,
        w: baseW, h: 18 * scale,
        ingredients: [...ingredients],
    });
    layerCount = 1;
    score = Math.round(baseW / scale);
}

// --- 生成移动面团 ---
function spawnMovingDough() {
    // 检查上一层是否太窄
    if (stack.length > 0 && stack[stack.length - 1].w < 10 * scale) {
        doGameOver();
        return;
    }
    // 检查dough对象是否存在（第一次baseLayer后dough是null）
    if (!dough) {
        doGameOver();
        return;
    }
    if (dough.w < 10 * scale) {
        doGameOver();
        return;
    }
    const lastLayer = stack[stack.length - 1];
    // 检查是否是双倍层（每隔5层出现一个）
    const isTrap = (layerCount % 5 === 0);
    const spd = (1.2 + Math.pow(layerCount, 0.7) * 0.25) * scale;
    dough.x = lastLayer.x + lastLayer.w;
    dough.y = stackTopY();
    dough.speed = spd;
    dough.cutting = false;
    dough.moving = true;
    dough.ingredients = [randomIng(), randomIng()];
    dough.isTrap = isTrap;
}

// --- 切割 ---
function cutDough() {
    if (!dough || dough.cutting || state !== STATE.PLAYING || gameState === 'dying') return;
    dough.cutting = true;
    dough.moving = false;

    // 陷阱层：切成两半各叠上去
    if (dough.isTrap) {
        cutTrap();
        return;
    }

    // 点击位置决定切在哪：面团中心
    const cutX = dough.x + dough.w / 2;
    const leftW = dough.w / 2;
    const rightW = dough.w / 2;

    // 随机决定保留哪一半（模拟真实切割的不确定性）
    // 但保留比例在40%-60%之间，不是固定50%
    const keepRatio = 0.4 + Math.random() * 0.2; // 0.4-0.6
    const keepW = Math.round(dough.w * keepRatio);
    const dropW = dough.w - keepW;

    // 随机丢弃左边还是右边
    const dropLeft = Math.random() < 0.5;
    const remainW = keepW;
    const remainX = dropLeft ? (dough.x + dropW) : dough.x;

    if (dropLeft) {
        dropPiece(dough.x, dropW, -3, dough.y);
    } else {
        dropPiece(dough.x + dough.w - dropW, dropW, 3, dough.y);
    }

    // 配料连线检测
    const lastLayer = stack[stack.length - 1];
    const lastIng = lastLayer.ingredients.map(i => i.name);
    const curIng = dough.ingredients.map(i => i.name);
    let linkBonus = 0;
    let linkIngs = [];
    for (const ing of curIng) {
        if (lastIng.includes(ing)) {
            linkBonus += 15;
            linkIngs.push(ing);
        }
    }
    // 连线特效
    for (const ing of linkIngs) {
        const info = INGREDIENTS.find(i => i.name === ing);
        if (info) addParticles(remainX + remainW/2, dough.y, info.color, 5);
    }

    // 添加新层
    addLayer(remainX, remainW, linkBonus);
}

function cutTrap() {
    // 双倍层：不切小，直接叠两层同样宽度的面团
    // 这是奖励层，让玩家有机会恢复
    const mid = dough.x + dough.w / 2;
    const fullW = dough.w;

    // 叠第一层
    stack.push({
        x: dough.x, y: dough.y, w: fullW, h: dough.h,
        ingredients: dough.ingredients,
    });
    layerCount++;
    score += Math.round(fullW / scale);

    // 叠第二层
    stack.push({
        x: dough.x, y: dough.y - dough.h, w: fullW, h: dough.h,
        ingredients: dough.ingredients,
    });
    layerCount++;
    score += Math.round(fullW / scale);

    feedbackMsg = '💥 双倍层! +双倍分';
    feedbackColor = '#FF6B35';
    feedbackTimer = 60;
    addParticles(mid, dough.y + dough.h/2, '#FF6B35', 20);

    // 双倍层后，下一层宽度不变，直接生成
    spawnMovingDough();
}

function addLayer(x, w, linkBonus) {
    const layer = {
        x: x, y: dough.y, w: w, h: dough.h,
        ingredients: [...dough.ingredients],
    };
    stack.push(layer);
    layerCount++;
    score += Math.round(w / scale);

    // 配料三连检测（最近3层）
    let tripleBonus = 0;
    if (stack.length >= 3) {
        const last3 = stack.slice(-3).map(l => l.ingredients[0].name);
        if (last3[0] === last3[1] && last3[1] === last3[2]) {
            tripleBonus = 50;
            feedbackMsg = '🔥 配料三连! +50';
            feedbackColor = '#FF4444';
            feedbackTimer = 80;
            addParticles(x + w/2, dough.y, '#FF4444', 25);
        }
    }

    // 检查保留比例（模拟切割结果）
    const keptRatio = w / dough.w;
    if (keptRatio > 0.55) {
        combo++;
        score += 10 * combo;
        feedbackMsg = `✨ 好刀! Combo x${combo}`;
        feedbackColor = '#FFD700';
        feedbackTimer = 60;
        addParticles(x + w/2, dough.y + dough.h/2, '#FFD700', 15);
    } else {
        combo = 0;
        feedbackMsg = '切得一般';
        feedbackColor = '#FFA500';
        feedbackTimer = 40;
    }

    if (linkBonus > 0) {
        score += linkBonus;
        if (tripleBonus === 0) {
            feedbackMsg += ` +${linkBonus}连线!`;
        }
        feedbackColor = '#00FFFF';
        feedbackTimer = 70;
    }
    if (tripleBonus > 0) {
        score += tripleBonus;
        feedbackColor = '#FF4444';
    }

    // 失败：面团太窄
    if (w < 10 * scale) {
        feedbackMsg = '💀 面团太薄了!';
        feedbackColor = '#F44336';
        feedbackTimer = 60;
        doGameOver();
        return;
    }

    // 关卡进度提示
    if (layerCount % 10 === 0) {
        feedbackMsg = `🎉 突破${layerCount}层!`;
        feedbackColor = '#00FF00';
        feedbackTimer = 80;
        addParticles(W/2, H*0.5, '#00FF00', 30);
    }

    spawnMovingDough();
}

function dropPiece(startX, w, vx, y) {
    fallingPieces.push({
        x: startX, y: y, w: w, h: dough.h,
        vx: vx * scale, vy: -2 * scale,
        rotation: 0, rotSpeed: (Math.random() < 0.5 ? -1 : 1) * 0.05,
        alpha: 1,
    });
}

function dropEntirePiece() {
    dropPiece(dough.x, dough.w, dough.speed > 0 ? 3 : -3, dough.y);
}

function addParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const spd = Math.random() * 4 + 1;
        particles.push({
            x, y,
            vx: Math.cos(angle) * spd,
            vy: Math.sin(angle) * spd - 2,
            r: Math.random() * 4 + 2,
            color,
            life: 1,
        });
    }
}

function startGame() {
    state = STATE.PLAYING;
    score = 0;
    layerCount = 0;
    combo = 0;
    animTime = 0;
    stack = [];
    fallingPieces = [];
    particles = [];
    cameraY = 0;
    feedbackMsg = '';
    feedbackTimer = 0;
    dough = null;
    gameState = 'playing';
    spawnBaseLayer();
}

function doGameOver() {
    state = STATE.GAMEOVER;
    animTime = 0;
    gameState = 'dying';
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('pizzaStackHigh', highScore.toString());
    }
}

function handleTap() {
    if (state === STATE.MENU) { startGame(); return; }
    if (state === STATE.GAMEOVER) {
        startGame();
        return;
    }
    if (state === STATE.PLAYING && dough && !dough.cutting && gameState === 'playing') {
        cutDough();
    }
}

canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(); });
canvas.addEventListener('click', (e) => { e.preventDefault(); handleTap(); });
document.addEventListener('keydown', (e) => {
    if (e.key === ' ' || e.key === 'Enter') handleTap();
});

function update(dt) {
    animTime += dt;

    if (state !== STATE.PLAYING) return;

    // 面团移动
    if (dough && dough.moving && !dough.cutting) {
        dough.x += dough.speed;
        dough.y = stackTopY();
        if (dough.x < -dough.w) { dough.speed = Math.abs(dough.speed); }
        if (dough.x + dough.w > W) { dough.speed = -Math.abs(dough.speed); }
    }

    // 掉落面片
    for (let i = fallingPieces.length - 1; i >= 0; i--) {
        const p = fallingPieces[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.15;
        p.rotation += p.rotSpeed; p.alpha -= 0.015;
        if (p.alpha <= 0) fallingPieces.splice(i, 1);
    }

    // 粒子
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.1;
        p.life -= 0.02;
        if (p.life <= 0) particles.splice(i, 1);
    }

    if (feedbackTimer > 0) feedbackTimer--;

    // 相机跟随
    if (dough && dough.moving) {
        const targetY = -(dough.y - H * 0.65);
        cameraY += (targetY - cameraY) * 0.1;
    }
    
    // 检查是否需要重置栈位置
    checkResetStack();
}

function drawRectRounded(x, y, w, h, r, fill, stroke) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
}

function drawLayer(layer) {
    const x = layer.x, y = layer.y, w = layer.w, h = layer.h;
    if (w <= 0 || h <= 0 || isNaN(w)) return;

    // 底色渐变
    const grad = ctx.createLinearGradient(x, y, x + w, y + h);
    grad.addColorStop(0, '#F4A460');
    grad.addColorStop(0.5, '#DEB887');
    grad.addColorStop(1, '#D2691E');
    drawRectRounded(x, y, w, h, 4 * scale, grad, '#CD853F');

    // 配料emoji
    ctx.font = `${Math.min(14, w / (layer.ingredients.length + 1)) * scale}px Arial`;
    ctx.textAlign = 'center';
    for (let i = 0; i < layer.ingredients.length; i++) {
        const ix = x + (i + 0.5) * (w / (layer.ingredients.length + 1));
        ctx.fillText(layer.ingredients[i].emoji, ix, y + h/2 + 3*scale);
    }
}

function drawDough() {
    if (!dough) return;
    const d = dough;
    const grad = ctx.createLinearGradient(d.x, d.y, d.x, d.y + d.h);
    grad.addColorStop(0, '#FFE4B5');
    grad.addColorStop(1, '#DEB887');
    drawRectRounded(d.x, d.y, d.w, d.h, 4 * scale, grad, 'rgba(255,255,255,0.4)');

    // 配料emoji
    ctx.font = `${Math.min(12, d.w / (d.ingredients.length + 1)) * scale}px Arial`;
    ctx.textAlign = 'center';
    for (let i = 0; i < d.ingredients.length; i++) {
        const ix = d.x + (i + 0.5) * (d.w / (d.ingredients.length + 1));
        ctx.fillText(d.ingredients[i].emoji, ix, d.y + d.h/2 + 3*scale);
    }

    // 陷阱提示
    if (d.isTrap) {
        ctx.fillStyle = '#FF4444';
        ctx.font = `bold ${14*scale}px Arial`;
        ctx.fillText('⚠️ 双倍层!', d.x + d.w/2, d.y - 5*scale);
    }

    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${10*scale}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('点击切!', d.x + d.w/2, d.y + d.h/2 + 12*scale);
}

function drawFallingPiece(p) {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.translate(p.x + p.w/2, p.y + p.h/2);
    ctx.rotate(p.rotation);
    ctx.fillStyle = '#DEB887';
    ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    ctx.restore();
}

function drawParticles() {
    for (const p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
}

function drawUI() {
    const s = scale;
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${20*s}px Arial`;
    ctx.textAlign = 'left';
    ctx.fillText(`🍕 ${score}`, 10*s, 30*s);
    ctx.font = `${14*s}px Arial`;
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText(`${layerCount}层`, 10*s, 50*s);
    if (combo > 1) {
        ctx.fillStyle = '#FFD700';
        ctx.font = `bold ${16*s}px Arial`;
        ctx.fillText(`Combo x${combo}!`, 10*s, 70*s);
    }
    if (feedbackTimer > 0) {
        ctx.globalAlpha = Math.min(feedbackTimer / 20, 1);
        ctx.fillStyle = feedbackColor;
        ctx.font = `bold ${18*s}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText(feedbackMsg, W/2, 85*s);
        ctx.globalAlpha = 1;
    }
}

function drawMenu() {
    const s = scale;
    ctx.fillStyle = '#FF6B35';
    ctx.font = `bold ${42*s}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('🍕 披萨叠叠乐', W/2, H*0.2);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${14*s}px Arial`;
    ctx.fillText('Pizza Stack', W/2, H*0.26);
    ctx.font = `${13*s}px Arial`;
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('🍕 怎么玩？', W/2, H*0.33);
    ctx.fillText('1. 面团在栈顶上来回移动', W/2, H*0.39);
    ctx.fillText('2. 点击屏幕，面团被随机切割', W/2, H*0.45);
    ctx.fillText('3. 保留越多，下一层越大', W/2, H*0.51);
    ctx.fillText('4. 相同配料叠在一起有连线加分', W/2, H*0.57);
    ctx.fillText('5. 连续3层相同配料 = 🔥三连!', W/2, H*0.63);
    ctx.fillText('6. 每10层突破一次，面团会越来越小', W/2, H*0.69);
    // 新模式说明
    ctx.fillStyle = '#FFD700';
    ctx.font = `bold ${13*s}px Arial`;
    ctx.fillText('🎮 新版本！', W/2, H*0.76);
    ctx.fillStyle = 'rgba(255,215,0,0.6)';
    ctx.font = `${12*s}px Arial`;
    ctx.fillText('保留比例决定combo加成', W/2, H*0.81);
    ctx.fillText('每5层出现双倍层，一次叠两层', W/2, H*0.86);
    const pulse = 1 + Math.sin(animTime * 4) * 0.05;
    ctx.save();
    ctx.translate(W/2, H*0.90);
    ctx.scale(pulse, pulse);
    ctx.fillStyle = '#FF6B35';
    ctx.beginPath();
    ctx.roundRect(-80*s, -28*s, 160*s, 56*s, 28*s);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${22*s}px Arial`;
    ctx.fillText('开始游戏', 0, 8*s);
    ctx.restore();
    if (highScore > 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.font = `${13*s}px Arial`;
        ctx.fillText(`最高分: ${highScore}`, W/2, H*0.97);
    }
}

function drawGameOver() {
    const s = scale;
    const alpha = Math.min(animTime / 0.5, 0.7);
    ctx.fillStyle = `rgba(0,0,0,${alpha})`;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#FF6B35';
    ctx.font = `bold ${36*s}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('游戏结束', W/2, H*0.28);
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${52*s}px Arial`;
    ctx.fillText(`${score}`, W/2, H*0.42);
    ctx.font = `${14*s}px Arial`;
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText(`得分`, W/2, H*0.48);
    ctx.fillStyle = '#fff';
    ctx.font = `${16*s}px Arial`;
    ctx.fillText(`叠了 ${layerCount} 层`, W/2, H*0.55);
    if (score >= highScore && score > 0) {
        ctx.fillStyle = '#FFD700';
        ctx.font = `bold ${18*s}px Arial`;
        ctx.fillText('🎉 新纪录！', W/2, H*0.62);
    }
    if (animTime > 0.5) {
        const pulse = 1 + Math.sin(animTime * 3) * 0.03;
        ctx.save();
        ctx.translate(W/2, H*0.73);
        ctx.scale(pulse, pulse);
        ctx.fillStyle = '#FF6B35';
        ctx.beginPath();
        ctx.roundRect(-70*s, -25*s, 140*s, 50*s, 25*s);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${20*s}px Arial`;
        ctx.fillText('再来一次', 0, 7*s);
        ctx.restore();
    }
}

function draw() {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#1a0a00');
    grad.addColorStop(0.5, '#2a1500');
    grad.addColorStop(1, '#1a0a00');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = 'rgba(255,107,53,0.08)';
    ctx.lineWidth = 1;
    for (let i = 0; i < W; i += 40*scale) {
        for (let j = 0; j < H; j += 40*scale) {
            ctx.strokeRect(i, j, 40*scale, 40*scale);
        }
    }
    if (state === STATE.PLAYING || state === STATE.GAMEOVER) {
        ctx.save();
        ctx.translate(0, cameraY);
        for (const p of fallingPieces) drawFallingPiece(p);
        for (const layer of stack) drawLayer(layer);
        if (dough && state === STATE.PLAYING) drawDough();
        ctx.restore();
        drawParticles();
        drawUI();
    }
    if (state === STATE.MENU) drawMenu();
    if (state === STATE.GAMEOVER) drawGameOver();
}

let lastTime = 0;
function loop(timestamp) {
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;
    if (state === STATE.GAMEOVER || state === STATE.MENU) animTime += dt;
    update(dt);
    draw();
    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
