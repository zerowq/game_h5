<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>披萨叠叠乐 - Pizza Stack</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #1a0a00;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        #gameCanvas {
            display: block;
            margin: 0 auto;
        }
    </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<script>
// ============================================================
//  披萨叠叠乐 - Pizza Stack (v4 - 完整重做)
//  核心玩法：面团从左到右移动，点击屏幕切一刀，
//          切的位置决定留下哪边。切不准面团会越来越小。
// ============================================================

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// --- 屏幕适配 ---
let W, H, scale;
function resize() {
    const ratio = 9 / 16;
    if (window.innerWidth / window.innerHeight < ratio) {
        W = window.innerWidth;
        H = W / ratio;
    } else {
        H = window.innerHeight;
        W = H * ratio;
    }
    const dx = (window.innerWidth - W) / 2;
    const dy = (window.innerHeight - H) / 2;
    canvas.style.position = 'absolute';
    canvas.style.left = dx + 'px';
    canvas.style.top = dy + 'px';
    canvas.width = W;
    canvas.height = H;
    scale = W / 400;
}
window.addEventListener('resize', resize);
resize();

// --- 状态 ---
const STATE = { MENU: 0, PLAYING: 1, GAMEOVER: 2 };
let state = STATE.MENU;
let score = 0;
let highScore = parseInt(localStorage.getItem('pizzaStackHigh') || '0');
let layerCount = 0;
let combo = 0;
let animTime = 0;
let bestLayer = 0;

// --- 游戏数据 ---
let stack = [];          // 已叠好的层 [{x, y, w, h}]
let fallingPieces = [];  // 飞出去的面片
let particles = [];      // 粒子
let cameraY = 0;

// 当前移动的面团
let dough = null;        // {x, y, w, h, speed, cutting}

// 反馈消息
let feedbackMsg = '';
let feedbackTimer = 0;
let feedbackColor = '#fff';

// --- 工具 ---
function randInt(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }

// --- 栈顶Y ---
function stackTopY() {
    if (stack.length === 0) return H * 0.7;
    return stack[stack.length - 1].y - stack[stack.length - 1].h;
}

// --- 生成面团 ---
function spawnDough() {
    const baseW = randInt(80, 120) * scale;
    const dir = Math.random() < 0.5 ? -1 : 1;
    const spd = (1.2 + layerCount * 0.08) * scale; // 随层数加速
    dough = {
        x: dir > 0 ? -baseW : W + baseW,
        y: stackTopY(),
        w: baseW,
        h: 16 * scale,
        speed: spd * dir,
        cutting: false,
    };
}

// --- 切割 ---
function cutDough() {
    if (!dough || dough.cutting || state !== STATE.PLAYING) return;
    dough.cutting = true;
    
    // 点击位置：面团中心
    const cutRatio = 0.5;
    const cutX = dough.x + dough.w * cutRatio;
    const leftW = cutX - dough.x;
    const rightW = dough.x + dough.w - cutX;
    
    // 两边相等，完美切割！
    if (Math.abs(leftW - rightW) / Math.max(leftW, rightW) < 0.01) {
        // 完美切割：两边都保留
        combo++;
        score += 10 * combo;
        feedbackMsg = `🎯 Perfect! Combo x${combo}`;
        feedbackColor = '#FFD700';
        feedbackTimer = 50;
        addParticles(cutX, dough.y + dough.h/2, '#FFD700', 15);
        addLayer(dough.x, dough.w);
    } else if (leftW > rightW) {
        // 左边大，丢弃左边，保留右边
        combo = 0;
        dropPiece(dough.x, leftW, -3, dough.y);
        addLayer(cutX, rightW);
    } else {
        // 右边大，丢弃右边，保留左边
        combo = 0;
        dropPiece(cutX + rightW, rightW, 3, dough.y);
        addLayer(cutX, leftW);
    }
    
    dough.cutting = false;
}

function addLayer(x, w) {
    const layer = { x: x, y: dough.y, w: w, h: dough.h };
    stack.push(layer);
    layerCount++;
    score += Math.round(w / scale);
    
    if (layerCount > bestLayer) bestLayer = layerCount;
    
    // 失败：面团太窄
    if (w < 8 * scale) {
        feedbackMsg = '💀 面团太薄了!';
        feedbackColor = '#F44336';
        feedbackTimer = 60;
        setTimeout(() => { if (state === STATE.PLAYING) doGameOver(); }, 600);
        return;
    }
    
    // 延迟生成下一个
    setTimeout(() => {
        if (state === STATE.PLAYING) spawnDough();
    }, 250);
}

function dropPiece(startX, w, vx, y) {
    fallingPieces.push({
        x: startX, y: y, w: w, h: dough.h,
        vx: vx * scale, vy: -2 * scale,
        rotation: 0, rotSpeed: (Math.random() < 0.5 ? -1 : 1) * 0.05,
        alpha: 1,
    });
}

function addParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const spd = Math.random() * 4 + 1;
        particles.push({
            x, y,
            vx: Math.cos(angle) * spd,
            vy: Math.sin(angle) * spd - 2,
            r: Math.random() * 4 + 2,
            color,
            life: 1,
        });
    }
}

// --- 开始/结束 ---
function startGame() {
    state = STATE.PLAYING;
    score = 0;
    layerCount = 0;
    combo = 0;
    animTime = 0;
    bestLayer = 0;
    stack = [];
    fallingPieces = [];
    particles = [];
    cameraY = 0;
    feedbackMsg = '';
    feedbackTimer = 0;
    dough = null;
    spawnDough();
}

function doGameOver() {
    state = STATE.GAMEOVER;
    animTime = 0;
    if (score > highScore) {
        highScore = score;
        localStorage.setItem('pizzaStackHigh', highScore.toString());
    }
}

// --- 输入 ---
function handleTap() {
    if (state === STATE.MENU) {
        startGame();
        return;
    }
    if (state === STATE.GAMEOVER) {
        if (animTime > 0.5) startGame();
        return;
    }
    if (state === STATE.PLAYING && dough && !dough.cutting) {
        cutDough();
    }
}

canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleTap(); });
canvas.addEventListener('click', (e) => { e.preventDefault(); handleTap(); });
document.addEventListener('keydown', (e) => {
    if (e.key === ' ' || e.key === 'Enter') handleTap();
});

// --- 更新 ---
function update(dt) {
    animTime += dt;
    
    if (state !== STATE.PLAYING) return;
    
    // 面团移动
    if (dough && !dough.cutting) {
        dough.x += dough.speed;
        dough.y = stackTopY();
        // 反弹
        if (dough.x < -dough.w) { dough.speed = Math.abs(dough.speed); }
        if (dough.x + dough.w > W) { dough.speed = -Math.abs(dough.speed); }
    }
    
    // 掉落面片
    for (let i = fallingPieces.length - 1; i >= 0; i--) {
        const p = fallingPieces[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.15;
        p.rotation += p.rotSpeed; p.alpha -= 0.015;
        if (p.alpha <= 0) fallingPieces.splice(i, 1);
    }
    
    // 粒子
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.1;
        p.life -= 0.02;
        if (p.life <= 0) particles.splice(i, 1);
    }
    
    // 反馈
    if (feedbackTimer > 0) feedbackTimer--;
    
    // 相机跟随：始终让面团在屏幕中央偏下的位置
    if (dough) {
        const targetY = -(dough.y - H * 0.65);
        cameraY += (targetY - cameraY) * 0.1;
    }
}

// --- 绘制 ---
function drawRectRounded(x, y, w, h, r, fill, stroke) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
    if (fill) { ctx.fillStyle = fill; ctx.fill(); }
    if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 2; ctx.stroke(); }
}

function drawLayer(layer) {
    const x = layer.x, y = layer.y, w = layer.w, h = layer.h;
    if (w <= 0 || h <= 0 || isNaN(w)) return;
    
    // 披萨渐变
    const grad = ctx.createLinearGradient(x, y, x + w, y + h);
    grad.addColorStop(0, '#F4A460');
    grad.addColorStop(0.5, '#DEB887');
    grad.addColorStop(1, '#D2691E');
    drawRectRounded(x, y, w, h, 4 * scale, grad, '#CD853F');
}

function drawDough() {
    if (!dough) return;
    const d = dough;
    
    const grad = ctx.createLinearGradient(d.x, d.y, d.x, d.y + d.h);
    grad.addColorStop(0, '#FFE4B5');
    grad.addColorStop(1, '#DEB887');
    drawRectRounded(d.x, d.y, d.w, d.h, 4 * scale, grad, 'rgba(255,255,255,0.4)');
    
    // 提示文字
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${10*scale}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('点击切!', d.x + d.w/2, d.y + d.h/2 + 4*scale);
}

function drawFallingPiece(p) {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.translate(p.x + p.w/2, p.y + p.h/2);
    ctx.rotate(p.rotation);
    ctx.fillStyle = '#DEB887';
    ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
    ctx.restore();
}

function drawParticles() {
    for (const p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;
}

function drawUI() {
    const s = scale;
    
    // 分数
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${20*s}px Arial`;
    ctx.textAlign = 'left';
    ctx.fillText(`🍕 ${score}`, 10*s, 30*s);
    
    // 层数
    ctx.font = `${14*s}px Arial`;
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText(`${layerCount}层`, 10*s, 50*s);
    
    // Combo
    if (combo > 1) {
        ctx.fillStyle = '#FFD700';
        ctx.font = `bold ${16*s}px Arial`;
        ctx.fillText(`Combo x${combo}!`, 10*s, 70*s);
    }
    
    // 反馈消息
    if (feedbackTimer > 0) {
        ctx.globalAlpha = Math.min(feedbackTimer / 20, 1);
        ctx.fillStyle = feedbackColor;
        ctx.font = `bold ${18*s}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText(feedbackMsg, W/2, 85*s);
        ctx.globalAlpha = 1;
    }
}

function drawMenu() {
    const s = scale;
    
    // 标题
    ctx.fillStyle = '#FF6B35';
    ctx.font = `bold ${42*s}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('🍕 披萨叠叠乐', W/2, H*0.2);
    
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = `${14*s}px Arial`;
    ctx.fillText('Pizza Stack', W/2, H*0.26);
    
    // 玩法说明
    ctx.font = `${13*s}px Arial`;
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText('面团从左到右移动', W/2, H*0.36);
    ctx.fillText('点击屏幕，面团会从中间被切开', W/2, H*0.41);
    ctx.fillText('切得越准，留下的面团越大', W/2, H*0.46);
    ctx.fillText('两边一样大 → Perfect! 加分+', W/2, H*0.51);
    ctx.fillText('切不准面团会越来越小，太小就输了', W/2, H*0.56);
    
    // 开始按钮
    const pulse = 1 + Math.sin(animTime * 4) * 0.05;
    ctx.save();
    ctx.translate(W/2, H*0.68);
    ctx.scale(pulse, pulse);
    ctx.fillStyle = '#FF6B35';
    ctx.beginPath();
    ctx.roundRect(-80*s, -28*s, 160*s, 56*s, 28*s);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${22*s}px Arial`;
    ctx.fillText('开始游戏', 0, 8*s);
    ctx.restore();
    
    if (highScore > 0) {
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.font = `${13*s}px Arial`;
        ctx.fillText(`最高分: ${highScore}`, W/2, H*0.80);
    }
}

function drawGameOver() {
    const s = scale;
    const alpha = Math.min(animTime / 0.5, 0.7);
    
    ctx.fillStyle = `rgba(0,0,0,${alpha})`;
    ctx.fillRect(0, 0, W, H);
    
    ctx.fillStyle = '#FF6B35';
    ctx.font = `bold ${36*s}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('游戏结束', W/2, H*0.28);
    
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${52*s}px Arial`;
    ctx.fillText(`${score}`, W/2, H*0.42);
    
    ctx.font = `${14*s}px Arial`;
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillText(`得分`, W/2, H*0.48);
    
    ctx.fillStyle = '#fff';
    ctx.font = `${16*s}px Arial`;
    ctx.fillText(`叠了 ${layerCount} 层`, W/2, H*0.55);
    
    if (score >= highScore && score > 0) {
        ctx.fillStyle = '#FFD700';
        ctx.font = `bold ${18*s}px Arial`;
        ctx.fillText('🎉 新纪录！', W/2, H*0.62);
    }
    
    if (animTime > 0.5) {
        const pulse = 1 + Math.sin(animTime * 3) * 0.03;
        ctx.save();
        ctx.translate(W/2, H*0.73);
        ctx.scale(pulse, pulse);
        ctx.fillStyle = '#FF6B35';
        ctx.beginPath();
        ctx.roundRect(-70*s, -25*s, 140*s, 50*s, 25*s);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.font = `bold ${20*s}px Arial`;
        ctx.fillText('再来一次', 0, 7*s);
        ctx.restore();
    }
}

function draw() {
    // 背景
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#1a0a00');
    grad.addColorStop(0.5, '#2a1500');
    grad.addColorStop(1, '#1a0a00');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    
    // 厨房瓷砖背景
    ctx.strokeStyle = 'rgba(255,107,53,0.08)';
    ctx.lineWidth = 1;
    for (let i = 0; i < W; i += 40*scale) {
        for (let j = 0; j < H; j += 40*scale) {
            ctx.strokeRect(i, j, 40*scale, 40*scale);
        }
    }
    
    if (state === STATE.PLAYING || state === STATE.GAMEOVER) {
        ctx.save();
        ctx.translate(0, cameraY);
        
        // 掉落面片
        for (const p of fallingPieces) drawFallingPiece(p);
        
        // 堆叠的披萨
        for (const layer of stack) drawLayer(layer);
        
        // 当前面团
        if (dough && state === STATE.PLAYING) drawDough();
        
        ctx.restore();
        
        // 粒子
        drawParticles();
        
        // UI
        drawUI();
    }
    
    if (state === STATE.MENU) drawMenu();
    if (state === STATE.GAMEOVER) drawGameOver();
}

// --- 主循环 ---
let lastTime = 0;
function loop(timestamp) {
    const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
    lastTime = timestamp;
    
    if (state === STATE.GAMEOVER) animTime += dt;
    
    update(dt);
    draw();
    requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>
</body>
</html>
